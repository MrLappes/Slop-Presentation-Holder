name: Build Desktop Apps

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: SlopPresentationHolder-linux
            package_cmd: tar -czf SlopPresentationHolder-linux.tar.gz -C dist SlopPresentationHolder
            package_file: SlopPresentationHolder-linux.tar.gz
            build_cmd: bash scripts/build-linux.sh
            bin_path: dist/SlopPresentationHolder/SlopPresentationHolder
          - os: macos-latest
            artifact_name: SlopPresentationHolder-macos
            package_cmd: zip -r SlopPresentationHolder-macos.zip dist/SlopPresentationHolder
            package_file: SlopPresentationHolder-macos.zip
            build_cmd: bash scripts/build-macos.sh
            bin_path: dist/SlopPresentationHolder/SlopPresentationHolder
          - os: windows-latest
            artifact_name: SlopPresentationHolder-windows
            package_cmd: Compress-Archive -Path dist/SlopPresentationHolder/* -DestinationPath SlopPresentationHolder-windows.zip -Force
            package_file: SlopPresentationHolder-windows.zip
            build_cmd: powershell -ExecutionPolicy Bypass -File scripts/build-windows.ps1
            bin_path: dist/SlopPresentationHolder/SlopPresentationHolder.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2
          # Packages required to build pygame, piper_phonemize and related C/C++ extensions
          sudo apt-get install -y build-essential pkg-config cmake ninja-build \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libfreetype6-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            libespeak-ng-dev libprotobuf-dev protobuf-compiler libssl-dev zlib1g-dev \
            onnxruntime-dev

          # Ensure pkg-config is available for freetype detection
          export PKG_CONFIG_PATH="/usr/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" || true

      - name: Install macOS Homebrew dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install espeak-ng pkg-config cmake ninja onnxruntime
          # macOS Homebrew headers typically live in /opt/homebrew/include or /usr/local/include
          export BREW_PREFIX=$(brew --prefix)
          export CPATH="$BREW_PREFIX/include:/usr/include:$CPATH"

      - name: Install Python build dependencies (CI only)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install onnxruntime wheel first to provide runtime and headers where possible
          python -m pip install --upgrade onnxruntime
          # Make ONNX include path discoverable for extension builds
          python - <<'PY'
          import onnxruntime, os
          onnx_pkg_dir = os.path.dirname(onnxruntime.__file__)
          onnx_include = os.path.join(onnx_pkg_dir, 'include')
          print('ONNX_INCLUDE='+onnx_include)
          PY
          # Export CPATH so g++ can find onnxruntime and espeak-ng headers
          export ONNX_INCLUDE=$(python -c "import onnxruntime, os;print(os.path.join(os.path.dirname(onnxruntime.__file__),'include'))") || true
          export CPATH="$ONNX_INCLUDE:/usr/include/espeak-ng:$CPATH"
          # Install piper-phonemize into the runner environment so PyInstaller bundles it
          python -m pip install --no-deps git+https://github.com/rhasspy/piper-phonemize.git
          # Install remaining Python requirements and PyInstaller
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app
        run: ${{ matrix.build_cmd }}

      - name: Smoke test Python imports (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python - <<'PY'
          import slop.app
          import slop.project
          import slop.engine.tts
          import slop.voices.model_registry
          print("PY_IMPORT_SMOKE_OK")
          PY

      - name: Smoke test Python imports (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          python -c "import slop.app, slop.project, slop.engine.tts, slop.voices.model_registry; print('PY_IMPORT_SMOKE_OK')"

      - name: Smoke check built binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          test -f "${{ matrix.bin_path }}"
          echo "BINARY_SMOKE_OK"

      - name: Smoke check espeak-ng data (Linux)
        if: runner.os == 'Linux'
        run: |
          find dist/SlopPresentationHolder -path "*espeak-ng-data*" | head -n 1

      - name: Smoke check built binary (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (!(Test-Path "${{ matrix.bin_path }}")) {
            Write-Error "Built binary not found: ${{ matrix.bin_path }}"
          }
          Write-Host "BINARY_SMOKE_OK"

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: ${{ matrix.package_cmd }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: ${{ matrix.package_cmd }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_file }}

  release:
    name: Create Tag Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz

  release-nightly:
    name: Create Nightly Prerelease
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish nightly prerelease with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build (${{ github.sha }})
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
