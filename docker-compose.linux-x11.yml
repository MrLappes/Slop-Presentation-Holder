services:
  slop:
    environment:
      DISPLAY: ${DISPLAY}
      QT_QPA_PLATFORM: xcb
      QT_X11_NO_MITSHM: "1"
      PULSE_SERVER: unix:/tmp/pulse/native
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/tmp/pulse/native
      - /etc/machine-id:/etc/machine-id:ro
    user: "${UID:-1000}:${GID:-1000}"
    devices:
      - /dev/snd:/dev/snd
